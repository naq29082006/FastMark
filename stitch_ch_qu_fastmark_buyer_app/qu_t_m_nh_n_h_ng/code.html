<style>
        .scanner-frame {
            position: relative;
            width: 280px;
            height: 280px;
        }
        
        .scanner-frame::before,
        .scanner-frame::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #00873a; /* primary-container */
            border-style: solid;
        }

        .scanner-corner-tl {
            top: 0;
            left: 0;
            border-width: 4px 0 0 4px;
            border-top-left-radius: 12px;
        }

        .scanner-corner-tr {
            top: 0;
            right: 0;
            border-width: 4px 4px 0 0;
            border-top-right-radius: 12px;
        }

        .scanner-corner-bl {
            bottom: 0;
            left: 0;
            border-width: 0 0 4px 4px;
            border-bottom-left-radius: 12px;
        }

        .scanner-corner-br {
            bottom: 0;
            right: 0;
            border-width: 0 4px 4px 0;
            border-bottom-right-radius: 12px;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #00873a;
            box-shadow: 0 0 4px #00873a;
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
<style>
    body {

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden relative">

<header class="bg-surface border-b border-outline-variant flat no shadows docked full-width top-0 z-50 flex flex-col w-full px-container-margin py-unit gap-2">

<button aria-label="Back" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary text-center flex-1">Quét mã QR</h1>
<button aria-label="Flashlight" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="flashlight_on">flashlight_on</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->

<!-- Camera View Background (Simulated with image for prototype) -->

<div class="bg-cover bg-center w-full h-full opacity-60" data-alt="A slightly blurred, bright daytime background showing a typical Vietnamese country market scene. Baskets of fresh green vegetables and colorful fruits are visible in the soft focus background. The lighting is natural and vibrant, suggesting a bustling but organized outdoor market environment." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBQSy7JfOhY8wpJCaOPDbElqOPN9PDHsP_U7CinBWNkRHrJEoM5FW1GWjfzCtqljAtFq1ko_gXkCSeBO5ocCRxkyqwLU4zu6HfoHzp5CVRJSb9o3MNdXkSWfCxByXHdeAUlNMi2ghVKDTPMzEo4PCkLh8H4R_G4VJFMBDBR4V-dKmru7B6kHC_QSKZR5mtLxfKSmM_-hhgXSsRj4Q2C1TVreg5qGPyz9WODXXOIlq0V7JJNBSoFMi41ljbHzzhADQJERANFdRtrPM7i')"></div>
</div>
<!-- Overlay & Scanner Frame -->

<div class="text-center px-container-margin mb-8 max-w-md">
<p class="font-body-lg text-body-lg text-white mb-2">Quét mã QR đơn hàng của khách để xác nhận giao hàng.</p>

<div class="absolute scanner-corner-tl w-10 h-10 border-primary-container border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="absolute scanner-corner-tr w-10 h-10 border-primary-container border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="absolute scanner-corner-bl w-10 h-10 border-primary-container border-b-4 border-l-4 rounded-bl-xl"></div>

</div>

<span class="material-symbols-outlined" data-icon="keyboard">keyboard</span>

            </button>
</div>

<script>
        // Micro-interaction for back button
        document.querySelector('[aria-label="Back"]').addEventListener('click', (e) => {
            e.currentTarget.style.transform = 'scale(0.95)';
            setTimeout(() => {
                e.currentTarget.style.transform = 'scale(1)';
            }, 150);
        });
        
        // Micro-interaction for flashlight toggle
        const flashlightBtn = document.querySelector('[aria-label="Flashlight"]');
        let flashlightOn = false;
        flashlightBtn.addEventListener('click', (e) => {
            flashlightOn = !flashlightOn;
            const icon = e.currentTarget.querySelector('span');
            icon.textContent = flashlightOn ? 'flashlight_off' : 'flashlight_on';
            if(flashlightOn) {
                e.currentTarget.classList.add('bg-surface-variant');
            } else {
                e.currentTarget.classList.remove('bg-surface-variant');
            }
        });
    </script>
