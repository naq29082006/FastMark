<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md h-screen flex flex-col items-center justify-center p-container-margin">
<!-- Error Canvas -->
<main class="w-full max-w-md mx-auto flex flex-col items-center text-center">
<!-- Illustration -->
<div class="mb-stack-gap-lg w-48 h-48 sm:w-64 sm:h-64 rounded-full bg-surface-container-high flex items-center justify-center shadow-sm relative overflow-hidden">
<span class="material-symbols-outlined text-6xl text-error" data-icon="wifi_off" style="font-variation-settings: 'FILL' 0; font-size: 80px;">wifi_off</span>
<div class="absolute inset-0 bg-error/5 rounded-full animate-pulse pointer-events-none"></div>
</div>
<!-- Typography Context -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile sm:font-headline-lg sm:text-headline-lg mb-stack-gap-md text-error">
            Mất kết nối
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-gap-lg max-w-sm">
            Không thể tải dữ liệu Chợ Quê. Vui lòng kiểm tra lại mạng internet của bạn.
        </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-stack-gap-md">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-unit hover:bg-primary-container transition-colors shadow-sm active:scale-95 transform duration-150" onclick="window.location.reload()">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                Thử lại
            </button>
</div>
<!-- Support Information -->
<div class="mt-stack-gap-lg p-container-margin bg-surface-container rounded-xl w-full text-left border border-outline-variant">
<h2 class="font-label-lg text-label-lg text-on-background mb-unit flex items-center gap-unit">
<span class="material-symbols-outlined text-primary" data-icon="support_agent">support_agent</span>
                Hỗ trợ kỹ thuật
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-2">
                Nếu lỗi vẫn tiếp diễn, vui lòng liên hệ:
            </p>
<div class="flex items-center gap-unit text-primary font-label-md text-label-md">
<span class="material-symbols-outlined" data-icon="call">call</span>
<a class="hover:underline" href="tel:19001234">1900 1234 (Miễn phí)</a>
</div>
</div>
</main>
<script>
        // Simple micro-interaction for the retry button
        document.querySelector('button').addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            icon.classList.add('animate-spin');
            setTimeout(() => icon.classList.remove('animate-spin'), 1000);
        });
    </script>
</body></html>
