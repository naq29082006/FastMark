<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hiệu quả khuyến mãi - FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
          darkMode: "class",

            extend: {

                      "surface": "#f8f9ff",
                      "surface-variant": "#d9e3f6",
                      "tertiary-fixed-dim": "#eec200",
                      "surface-dim": "#d0dbed",
                      "on-background": "#121c2a",
                      "outline-variant": "#bdcaba",
                      "tertiary-fixed": "#ffe083",
                      "on-tertiary-fixed": "#231b00",
                      "error-container": "#ffdad6",
                      "on-secondary-fixed-variant": "#005321",
                      "secondary": "#006e2f",
                      "primary-container": "#00873a",
                      "inverse-primary": "#62df7d",
                      "outline": "#6e7b6c",
                      "on-primary-container": "#f7fff2",
                      "on-primary-fixed-variant": "#005320",
                      "on-tertiary": "#ffffff",
                      "on-primary": "#ffffff",
                      "secondary-fixed-dim": "#4ae176",
                      "on-surface": "#121c2a",
                      "on-secondary-container": "#007432",
                      "surface-tint": "#006e2d",
                      "on-tertiary-container": "#4e3e00",
                      "tertiary-container": "#cea700",
                      "on-tertiary-fixed-variant": "#574500",
                      "surface-container-low": "#eff4ff",
                      "surface-container-highest": "#d9e3f6",
                      "on-secondary": "#ffffff",
                      "tertiary": "#735c00",
                      "secondary-fixed": "#6bff8f",
                      "on-error-container": "#93000a",
                      "on-error": "#ffffff",
                      "surface-container-high": "#dee9fc",
                      "on-primary-fixed": "#002109",
                      "error": "#ba1a1a",
                      "primary-fixed-dim": "#62df7d",
                      "inverse-on-surface": "#eaf1ff",
                      "primary": "#006b2c",
                      "inverse-surface": "#27313f",
                      "on-secondary-fixed": "#002109",
                      "surface-bright": "#f8f9ff",
                      "on-surface-variant": "#3e4a3d"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-gap-md": "16px",
                      "gutter": "16px",
                      "container-margin": "24px",
                      "stack-gap-lg": "32px",
                      "unit": "8px",
                      "touch-target-min": "56px"
              },
              "fontFamily": {
                      "label-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "price-display": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"]
              },
              "fontSize": {
                      "label-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "400"}],
                      "price-display": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "label-md": ["16px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

          }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased md:bg-surface-container-low min-h-screen pb-24 md:pb-0 font-body-md text-body-md">
<!-- Top App Bar -->
<header class="w-full sticky top-0 z-50 border-b border-outline-variant dark:border-outline bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed">
<div class="flex justify-between items-center px-gutter h-touch-target-min max-w-screen-md mx-auto">
<button aria-label="Quay lại" class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-surface-container-high dark:hover:bg-surface-container-highest active:scale-95 transition-transform text-on-surface-variant dark:text-surface-variant">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed truncate">Hiệu quả khuyến mãi</h1>
<button aria-label="Lịch biểu" class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-surface-container-high dark:hover:bg-surface-container-highest active:scale-95 transition-transform text-on-surface-variant dark:text-surface-variant">
<span class="material-symbols-outlined text-[24px]">calendar_month</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-screen-md mx-auto px-container-margin py-stack-gap-md space-y-stack-gap-lg">
<!-- Promotion Info Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-gap-md border border-outline-variant shadow-sm flex flex-col gap-unit">
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-md text-headline-md text-on-background">Giảm giá 20% Rau Sạch</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-[20px]">schedule</span>
                        01/10/2023 - 15/10/2023
                    </p>
</div>
<span class="bg-primary-container text-on-primary-container font-label-md text-label-md px-3 py-1 rounded-full whitespace-nowrap">Đang diễn ra</span>
</div>
</section>
<!-- KPI Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap-md">
<!-- Lượt xem -->
<div class="bg-surface-container-lowest rounded-xl p-stack-gap-md border border-outline-variant shadow-sm flex flex-col gap-2">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[28px] text-secondary">visibility</span>
<h3 class="font-label-lg text-label-lg">Lượt xem</h3>
</div>
<div class="flex items-end gap-2 mt-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">1,245</span>
<span class="font-body-md text-body-md text-secondary flex items-center mb-1">
<span class="material-symbols-outlined text-[16px]">arrow_upward</span> 12%
                    </span>
</div>
</div>
<!-- Lượt dùng mã -->
<div class="bg-surface-container-lowest rounded-xl p-stack-gap-md border border-outline-variant shadow-sm flex flex-col gap-2">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[28px] text-tertiary">local_activity</span>
<h3 class="font-label-lg text-label-lg">Lượt dùng mã</h3>
</div>
<div class="flex items-end gap-2 mt-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">328</span>
<span class="font-body-md text-body-md text-secondary flex items-center mb-1">
<span class="material-symbols-outlined text-[16px]">arrow_upward</span> 5%
                    </span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 text-sm">Tỷ lệ chuyển đổi: 26.3%</p>
</div>
<!-- Doanh thu từ khuyến mãi -->
<div class="bg-surface-container-lowest rounded-xl p-stack-gap-md border border-outline-variant shadow-sm flex flex-col gap-2 md:col-span-2">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[28px] text-primary">payments</span>
<h3 class="font-label-lg text-label-lg">Doanh thu từ khuyến mãi</h3>
</div>
<div class="flex items-end gap-2 mt-2">
<span class="font-price-display text-price-display text-error">4,520,000đ</span>
</div>
<!-- Simple Bar Chart Placeholder -->
<div class="w-full h-32 mt-4 flex items-end justify-between gap-2 border-b border-outline-variant pb-2 relative">
<!-- Y-axis labels (rough approximation) -->
<div class="absolute left-0 top-0 bottom-0 flex flex-col justify-between text-xs text-on-surface-variant pr-2 hidden sm:flex">
<span>1.5M</span>
<span>1.0M</span>
<span>0.5M</span>
</div>
<div class="flex-1 flex items-end justify-center group">
<div class="w-full max-w-[40px] bg-secondary-container rounded-t-sm h-[30%] hover:bg-primary transition-colors relative cursor-pointer">
<span class="absolute -top-8 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 bg-inverse-surface text-inverse-on-surface text-xs py-1 px-2 rounded whitespace-nowrap transition-opacity font-label-md text-label-md">450k</span>
</div>
</div>
<div class="flex-1 flex items-end justify-center group">
<div class="w-full max-w-[40px] bg-secondary-container rounded-t-sm h-[45%] hover:bg-primary transition-colors relative cursor-pointer"></div>
</div>
<div class="flex-1 flex items-end justify-center group">
<div class="w-full max-w-[40px] bg-secondary-container rounded-t-sm h-[80%] hover:bg-primary transition-colors relative cursor-pointer"></div>
</div>
<div class="flex-1 flex items-end justify-center group">
<div class="w-full max-w-[40px] bg-secondary-container rounded-t-sm h-[60%] hover:bg-primary transition-colors relative cursor-pointer"></div>
</div>
<div class="flex-1 flex items-end justify-center group">
<div class="w-full max-w-[40px] bg-primary rounded-t-sm h-[95%] relative cursor-pointer">
<span class="absolute -top-8 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface text-xs py-1 px-2 rounded whitespace-nowrap font-label-md text-label-md">1.4M</span>
</div>
</div>
</div>
<div class="w-full flex justify-between text-xs text-on-surface-variant mt-1 px-2">
<span class="flex-1 text-center">T2</span>
<span class="flex-1 text-center">T3</span>
<span class="flex-1 text-center">T4</span>
<span class="flex-1 text-center">T5</span>
<span class="flex-1 text-center font-bold text-on-surface">HN</span>
</div>
</div>
</section>
<!-- Action Button -->
<div class="pt-stack-gap-md pb-stack-gap-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-2 active:bg-surface-tint transition-colors shadow-sm">
<span>Quản lý mã khuyến mãi</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
</body></html>
