<body class="bg-surface text-on-surface antialiased min-h-screen pb-[100px]">
<!-- TopAppBar (Transactional - Hidden Nav, Keep Header) -->
<header class="docked full-width top-0 bg-surface border-b border-outline-variant flex flex-col w-full px-container-margin py-unit gap-2 z-40 sticky">
<div class="flex items-center justify-between h-touch-target-min">

<span class="material-symbols-outlined" style="font-size: 28px;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-on-surface">Xác nhận Đặt hàng</h1>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="px-container-margin py-stack-gap-lg max-w-3xl mx-auto flex flex-col gap-stack-gap-lg">
<!-- Sản phẩm Card -->
<section class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant">
<h2 class="font-label-lg text-label-lg text-on-surface mb-4">Thông tin sản phẩm</h2>
<div class="flex gap-4">
<img alt="Rau cải xanh" class="w-24 h-24 object-cover rounded-lg flex-shrink-0" data-alt="A close-up, high-quality photo of fresh, vibrant green organic vegetables, specifically bok choy and spinach, arranged neatly in a woven bamboo basket. The lighting is bright and natural, typical of a lively outdoor morning market in Vietnam, casting soft shadows. The overall mood is fresh, wholesome, and inviting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5rrP-JVQ6BL_xjsZxon5xQ12vm9UBBhufW9QcIi_JJYqE0oOZm7Tl9jIAxppiX6kl-x3NYxtv_fX-dfPdnoczRXZjHkVHWRaHE5o2diif3aqOWV9rr7GkWakcZarm8LnOmOKPji5Kkzrmt81VceQF3qxjBqw25B5YerF0o4PEdnqrdG14oqUiZHSGExykiqlqWdP6ZYPbhOM-2fKQmtFn-V6SEy40RPIajdAj6lmb4WeA-2jirAYWc462Y3ZypFp_pxRJVA18hmjO"/>
<div class="flex flex-col justify-between flex-grow">
<div>
<h3 class="font-body-lg text-body-lg text-on-surface font-semibold">Rau cải canh hữu cơ</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Gian hàng: Cô Tư Rau Sạch</p>
</div>
<div class="font-price-display text-price-display text-error">
                        25.000đ <span class="font-body-md text-body-md text-on-surface-variant">/ kg</span>
</div>
</div>
</div>
<!-- Số lượng -->
<div class="mt-6 flex items-center justify-between pt-4 border-t border-outline-variant">
<span class="font-label-lg text-label-lg text-on-surface">Số lượng (kg)</span>
<div class="flex items-center bg-surface-container rounded-lg p-1">
<button aria-label="Giảm số lượng" class="w-12 h-12 flex items-center justify-center rounded-md hover:bg-surface-variant text-on-surface">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="w-12 text-center font-headline-md text-headline-md-mobile text-on-surface">2</span>
<button aria-label="Tăng số lượng" class="w-12 h-12 flex items-center justify-center rounded-md hover:bg-surface-variant text-primary">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
<!-- Phương thức thanh toán -->
<section class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant">
<h2 class="font-label-lg text-label-lg text-on-surface mb-4">Phương thức thanh toán</h2>
<div class="flex flex-col gap-3">
<!-- Ví FastMark -->
<label class="flex items-center justify-between p-4 border border-primary rounded-lg bg-surface-container-low cursor-pointer min-h-touch-target-min">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 28px;">account_balance_wallet</span>
<div>
<div class="font-body-lg text-body-lg text-on-surface font-semibold">Ví FastMark</div>
<div class="font-body-md text-body-md text-on-surface-variant">Số dư: 500.000đ</div>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center bg-primary">
<span class="w-2.5 h-2.5 rounded-full bg-on-primary"></span>
</div>
<input checked="" class="hidden" name="payment_method" type="radio" value="wallet"/>
</label>
<!-- Tiền mặt -->
<label class="flex items-center justify-between p-4 border border-outline-variant rounded-lg hover:bg-surface-container-low cursor-pointer min-h-touch-target-min">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 28px;">payments</span>
<div class="font-body-lg text-body-lg text-on-surface">Tiền mặt khi nhận hàng</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
<input class="hidden" name="payment_method" type="radio" value="cash"/>
</label>
</div>
</section>

</section>

<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant p-container-margin shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
<div class="max-w-3xl mx-auto flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="font-label-lg text-label-lg text-on-surface-variant">Tổng thanh toán:</span>
<span class="font-price-display text-price-display text-error">50.000đ</span>
</div>
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md-mobile rounded-xl flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-[0.98] transition-transform shadow-md">
                Xác nhận đặt chỗ
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<script>
        // Simple script to handle radio button visual selection
        document.querySelectorAll('label').forEach(label => {
            label.addEventListener('click', function() {
                if(this.querySelector('input[type="radio"]')) {
                    // Reset all
                    document.querySelectorAll('label').forEach(l => {
                        if(l.querySelector('input[type="radio"]')) {
                            l.classList.remove('border-primary', 'bg-surface-container-low');
                            l.classList.add('border-outline-variant');
                            const indicator = l.querySelector('.w-6');
                            if(indicator) {
                                indicator.classList.remove('border-primary', 'bg-primary');
                                indicator.classList.add('border-outline-variant');
                                indicator.innerHTML = '';
                                l.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                                l.querySelector('.material-symbols-outlined').classList.add('text-on-surface-variant');
                                l.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
                            }
                        }
                    });
                    
                    // Set active
                    this.classList.add('border-primary', 'bg-surface-container-low');
                    this.classList.remove('border-outline-variant');
                    const activeIndicator = this.querySelector('.w-6');
                    if(activeIndicator) {
                        activeIndicator.classList.add('border-primary', 'bg-primary');
                        activeIndicator.classList.remove('border-outline-variant');
                        activeIndicator.innerHTML = '<span class="w-2.5 h-2.5 rounded-full bg-on-primary"></span>';
                        
                        const icon = this.querySelector('.material-symbols-outlined');
                        icon.classList.add('text-primary');
                        icon.classList.remove('text-on-surface-variant');
                        icon.style.fontVariationSettings = "'FILL' 1";
                    }
                }
            });
        });
    </script>
