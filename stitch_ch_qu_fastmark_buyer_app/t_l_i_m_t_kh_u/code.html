<!DOCTYPE html>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header: Navigation Shell Suppressed -->
<header class="flex items-center px-container-margin h-[72px] flex-shrink-0">
<button aria-label="Quay lại" class="w-touch-target-min h-touch-target-min flex items-center justify-center -ml-4 text-on-surface hover:bg-surface-variant rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-margin py-stack-gap-md max-w-md mx-auto w-full">
<!-- Header Text -->
<div class="mb-stack-gap-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-unit">
                Tạo mật khẩu mới
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Mật khẩu mới của bạn phải khác với mật khẩu đã sử dụng trước đó.
            </p>
</div>
<!-- Form -->
<form class="flex flex-col flex-1 gap-stack-gap-lg">
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="new-password">
                    Mật khẩu mới
                </label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline bg-surface-container-lowest font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="new-password" placeholder="Nhập ít nhất 8 ký tự" type="password"/>
<button aria-label="Hiện mật khẩu" class="absolute right-2 top-1/2 -translate-y-1/2 w-[48px] h-[48px] flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined" id="toggle-new-pwd">visibility_off</span>
</button>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="confirm-password">
                    Xác nhận mật khẩu
                </label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline bg-surface-container-lowest font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="confirm-password" placeholder="Nhập lại mật khẩu mới" type="password"/>
<button aria-label="Hiện mật khẩu" class="absolute right-2 top-1/2 -translate-y-1/2 w-[48px] h-[48px] flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined" id="toggle-confirm-pwd">visibility_off</span>
</button>
</div>
</div>
<!-- Spacer to push button to bottom on tall screens -->
<div class="flex-1"></div>
<!-- Primary Action -->
<div class="pb-container-margin pt-stack-gap-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-full flex items-center justify-center gap-2 font-headline-md text-headline-md-mobile hover:bg-surface-tint active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-primary shadow-sm" type="button">
                    Lưu mật khẩu
                    <span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
</form>
</main>
<script>
        // Simple micro-interaction for password visibility toggles
        function setupPasswordToggle(inputId, toggleIconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(toggleIconId);
            const button = icon.parentElement;

            button.addEventListener('click', () => {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        }

        setupPasswordToggle('new-password', 'toggle-new-pwd');
        setupPasswordToggle('confirm-password', 'toggle-confirm-pwd');
    </script>
</body></html>
