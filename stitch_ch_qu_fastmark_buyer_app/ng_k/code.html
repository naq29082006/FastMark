<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký - Chợ Quê FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#6bff8f",
                        "on-surface-variant": "#3e4a3d",
                        "primary": "#006b2c",
                        "on-primary-fixed-variant": "#005320",
                        "on-primary-fixed": "#002109",
                        "on-error": "#ffffff",
                        "secondary": "#006e2f",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#bdcaba",
                        "on-surface": "#121c2a",
                        "surface-dim": "#d0dbed",
                        "primary-fixed-dim": "#62df7d",
                        "on-background": "#121c2a",
                        "surface-container": "#e6eeff",
                        "on-tertiary-fixed-variant": "#574500",
                        "on-secondary-fixed": "#002109",
                        "secondary-fixed": "#6bff8f",
                        "surface-container-highest": "#d9e3f6",
                        "surface-container-low": "#eff4ff",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#f7fff2",
                        "surface-container-high": "#dee9fc",
                        "inverse-surface": "#27313f",
                        "primary-container": "#00873a",
                        "primary-fixed": "#7ffc97",
                        "tertiary-container": "#cea700",
                        "secondary-fixed-dim": "#4ae176",
                        "tertiary-fixed": "#ffe083",
                        "tertiary": "#735c00",
                        "outline": "#6e7b6c",
                        "inverse-on-surface": "#eaf1ff",
                        "on-secondary-fixed-variant": "#005321",
                        "inverse-primary": "#62df7d",
                        "tertiary-fixed-dim": "#eec200",
                        "surface-tint": "#006e2d",
                        "on-tertiary-container": "#4e3e00",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#007432",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#231b00",
                        "surface-variant": "#d9e3f6"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "touch-target-min": "56px",
                        "gutter": "16px",
                        "stack-gap-md": "16px",
                        "unit": "8px",
                        "stack-gap-lg": "32px",
                        "container-margin": "24px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "price-display": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "price-display": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "label-md": ["16px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex flex-col">
<!-- 
      TRANSACTIONAL SCREEN: No Navbars or Drawers.
      Focusing entirely on the registration task with high contrast and large touch targets.
    -->
<main class="flex-1 flex flex-col px-container-margin py-8 md:max-w-md md:mx-auto md:w-full md:justify-center">
<!-- Header Section -->
<header class="mb-stack-gap-lg pt-4">
<!-- Optional Back Action (Contextual) -->
<button aria-label="Quay lại" class="w-12 h-12 flex items-center justify-start text-on-surface-variant mb-4 hover:text-primary transition-colors rounded-full">
<span class="material-symbols-outlined" style="font-size: 32px;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">
                Tạo tài khoản mới
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Điền thông tin bên dưới để bắt đầu mua sắm tại Chợ Quê FastMark.
            </p>
</header>
<!-- Form Section -->
<form class="flex flex-col gap-stack-md flex-1">
<!-- Full Name Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="fullname">
                    Họ và tên
                </label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-lg text-body-lg transition-all" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn" required="" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">
                        person
                    </span>
</div>
</div>
<!-- Phone Number Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="phone">
                    Số điện thoại
                </label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-lg text-body-lg transition-all" id="phone" inputmode="numeric" name="phone" pattern="[0-9]*" placeholder="Nhập số điện thoại" required="" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">
                        call
                    </span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="password">
                    Mật khẩu
                </label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none font-body-lg text-body-lg transition-all pr-12" id="password" name="password" placeholder="Tạo mật khẩu (ít nhất 6 ký tự)" required="" type="password"/>
<button aria-label="Hiện mật khẩu" class="absolute right-0 top-0 h-full px-4 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none rounded-r-lg" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">
                            visibility_off
                        </span>
</button>
</div>
</div>
<!-- Spacer for mobile to push button down if needed, or just margin -->
<div class="mt-stack-gap-lg"></div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min rounded-full bg-primary text-on-primary font-headline-md text-headline-md flex items-center justify-center gap-2 hover:bg-secondary active:scale-[0.98] transition-all shadow-md" type="submit">
                Đăng ký
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">
                    arrow_forward
                </span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-stack-gap-lg pb-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Đã có tài khoản? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">
                    Đăng nhập
                </a>
</p>
</div>
</main>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
