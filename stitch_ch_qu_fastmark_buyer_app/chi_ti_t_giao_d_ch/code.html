<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chi tiết giao dịch - Chợ Quê FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#735c00",
                        "secondary": "#006e2f",
                        "on-secondary-container": "#007432",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#231b00",
                        "surface": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface-variant": "#3e4a3d",
                        "on-secondary-fixed": "#002109",
                        "tertiary-fixed-dim": "#eec200",
                        "tertiary-fixed": "#ffe083",
                        "surface-container-high": "#dee9fc",
                        "primary-container": "#00873a",
                        "inverse-surface": "#27313f",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#62df7d",
                        "secondary-fixed": "#6bff8f",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#4ae176",
                        "on-primary-container": "#f7fff2",
                        "primary-fixed-dim": "#62df7d",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#d9e3f6",
                        "surface-container": "#e6eeff",
                        "surface-bright": "#f8f9ff",
                        "outline": "#6e7b6c",
                        "primary": "#006b2c",
                        "secondary-container": "#6bff8f",
                        "on-secondary-fixed-variant": "#005321",
                        "on-tertiary-fixed-variant": "#574500",
                        "surface-container-low": "#eff4ff",
                        "on-background": "#121c2a",
                        "on-tertiary-container": "#4e3e00",
                        "on-primary-fixed": "#002109",
                        "surface-tint": "#006e2d",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#005320",
                        "surface-dim": "#d0dbed",
                        "on-surface": "#121c2a",
                        "primary-fixed": "#7ffc97",
                        "surface-variant": "#d9e3f6",
                        "tertiary-container": "#cea700",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "outline-variant": "#bdcaba"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "touch-target-min": "56px",
                        "gutter": "16px",
                        "stack-gap-lg": "32px",
                        "container-margin": "24px",
                        "stack-gap-md": "16px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "price-display": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "price-display": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-md": ["16px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Header (No TopAppBar since it's a detail/task-focused screen, replacing with a simple back-action header) -->
<header class="bg-surface border-b border-outline-variant flex items-center px-container-margin py-4 sticky top-0 z-10">
<button aria-label="Quay lại" class="w-[56px] h-[56px] flex items-center justify-start text-on-surface-variant hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-size: 32px;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface ml-2">Chi tiết giao dịch</h1>
</header>
<main class="px-container-margin py-stack-gap-lg max-w-2xl mx-auto">
<!-- Transaction Status Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-6 mb-stack-gap-md flex flex-col items-center justify-center text-center">
<div class="w-[72px] h-[72px] bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined" data-weight="fill" style="font-size: 40px;">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Thành công</h2>
<p class="font-price-display text-price-display text-primary">- 150.000đ</p>
</section>
<!-- Transaction Details Box -->
<section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-0 mb-stack-gap-md overflow-hidden">
<ul class="flex flex-col">
<!-- Info Row 1 -->
<li class="flex justify-between items-start py-5 px-6 border-b border-outline-variant hover:bg-surface-container-low transition-colors min-h-touch-target-min">
<span class="font-body-lg text-body-lg text-on-surface-variant w-1/3">Dịch vụ</span>
<span class="font-body-lg text-body-lg text-on-surface font-medium text-right w-2/3">Thanh toán đơn hàng #1024</span>
</li>
<!-- Info Row 2 -->
<li class="flex justify-between items-start py-5 px-6 border-b border-outline-variant hover:bg-surface-container-low transition-colors min-h-touch-target-min">
<span class="font-body-lg text-body-lg text-on-surface-variant w-1/3">Thời gian</span>
<span class="font-body-lg text-body-lg text-on-surface font-medium text-right w-2/3">14:30 - 24/10/2023</span>
</li>
<!-- Info Row 3 -->
<li class="flex justify-between items-start py-5 px-6 border-b border-outline-variant hover:bg-surface-container-low transition-colors min-h-touch-target-min">
<span class="font-body-lg text-body-lg text-on-surface-variant w-1/3">Mã giao dịch</span>
<span class="font-body-lg text-body-lg text-on-surface font-medium text-right w-2/3 break-all">TXN-9876543210</span>
</li>
<!-- Info Row 4 -->
<li class="flex justify-between items-start py-5 px-6 hover:bg-surface-container-low transition-colors min-h-touch-target-min">
<span class="font-body-lg text-body-lg text-on-surface-variant w-1/3">Nguồn tiền</span>
<span class="font-body-lg text-body-lg text-on-surface font-medium text-right w-2/3 flex justify-end items-center gap-2">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
                        Ví FastMark
                    </span>
</li>
</ul>
</section>
<!-- Actions -->
<section class="flex flex-col gap-4 mt-stack-gap-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex justify-center items-center gap-2 hover:bg-surface-tint transition-colors shadow-md">
<span>Xem đơn hàng</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full h-touch-target-min bg-transparent text-primary border border-primary font-headline-md text-headline-md rounded-lg flex justify-center items-center hover:bg-surface-container transition-colors">
                Liên hệ hỗ trợ
            </button>
</section>
</main>
<!-- Navigation suppressed as this is a specific transactional detail screen, focusing the user on the transaction details and immediate actions (view order, support). -->
</body></html>
