<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-2 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-transform duration-150 rounded-lg group" href="#">

<script>
        // Simple script to handle the toggle text update
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('status-toggle');
            const statusText = document.getElementById('store-status-text');

            toggle.addEventListener('change', function() {
                if(this.checked) {
                    statusText.textContent = 'Đang Mở Cửa';
                    statusText.className = 'font-label-lg text-label-lg text-primary font-bold';
                } else {
                    statusText.textContent = 'Đã Đóng Cửa';
                    statusText.className = 'font-label-lg text-label-lg text-error font-bold';
                }
            });
            
            // Initial toggle positioning for checkbox (Tailwind hack for custom toggle)
            const checkbox = document.querySelector('.toggle-checkbox');
            checkbox.style.right = checkbox.checked ? '0' : 'auto';
            checkbox.addEventListener('change', function() {
                 if(this.checked) {
                     this.style.right = '0';
                     this.style.left = 'auto';
                 } else {
                     this.style.right = 'auto';
                     this.style.left = '0';
                 }
            });
        });
    </script>
