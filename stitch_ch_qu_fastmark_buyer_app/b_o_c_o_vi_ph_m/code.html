<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Báo cáo vi phạm</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        }

<!-- Tailwind Config based on Brand Anchors -->

                        "tertiary-fixed-dim": "#eec200",
                        "tertiary-fixed": "#ffe083",
                        "surface-container-high": "#dee9fc",
                        "primary-container": "#00873a",
                        "inverse-surface": "#27313f",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#62df7d",
                        "secondary-fixed": "#6bff8f",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#4ae176",
                        "on-primary-container": "#f7fff2",

                        "surface-dim": "#d0dbed",
                        "on-surface": "#121c2a",
                        "primary-fixed": "#7ffc97",
                        "surface-variant": "#d9e3f6",
                        "tertiary-container": "#cea700",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "outline-variant": "#bdcaba"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "unit": "8px",
                        "touch-target-min": "56px",
                        "gutter": "16px",
                        "stack-gap-lg": "32px",
                        "container-margin": "24px",
                        "stack-gap-md": "16px"
                    },
                    fontFamily: {
                        "label-lg": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "price-display": ["Inter", "sans-serif"],

                    fontSize: {

        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- Contextual Header (Task-focused, suppressing global nav) -->
<header class="sticky top-0 z-50 bg-surface border-b border-outline-variant w-full flex items-center px-2 py-2 h-[72px]">
<button aria-label="Quay lại" class="h-touch-target-min w-touch-target-min flex items-center justify-center text-on-surface rounded-full hover:bg-surface-variant active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-primary">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-headline-md text-headline-md-mobile pr-[56px] text-on-surface">Báo cáo vi phạm</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-2xl mx-auto flex flex-col pt-stack-gap-md pb-[120px]">
<!-- Target Info Card -->
<section class="px-container-margin mb-stack-gap-lg">
<div class="flex items-center gap-gutter p-gutter bg-surface-container-low rounded-xl border border-outline-variant shadow-sm">
<div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 bg-surface-variant">
<img class="w-full h-full object-cover" data-alt="A close up photo of fresh, bright red tomatoes sitting in a rustic woven bamboo basket at an outdoor sunny market. The style is natural, vibrant, and appetizing, bathed in warm morning light typical of a traditional Vietnamese rural market setting. The image should evoke a sense of organic, locally sourced produce." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcs-xjLqhpGpn92ykLDGyqLB3OScvNzAKKUNhRlMDbW3Yv5hpQbshRncQ_UdtM5BbIeWs6ukIdxD9wyR3VJ-u4Tz5uZUNLMnd36DUu8i8YdKMGegFP9MDsqT7XWv0t8s8TyCiAJnnXkBYdErwBxWVZ8bwYI_2g7fWvKwY_S7nbkz0d0FZcGdO3ALIAmfci0U01qlIWc_0pGZRxAj70kRmxYB1J7xvVtlRXEuFVyQSWzil0hVgi1p_IQQqMFz0r1SBgoWHhpinT2W4D"/>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-1">Đang báo cáo sản phẩm:</span>
<span class="font-headline-md text-headline-md-mobile text-on-surface leading-tight">Cà chua VietGAP hữu cơ</span>
<span class="font-body-md text-body-md text-primary mt-1">Cửa hàng: Cô Hai Rau Sạch</span>
</div>
</div>
</section>
<!-- Form Form -->
<form class="flex flex-col gap-stack-gap-lg w-full">
<!-- Reasons Section -->
<section class="px-container-margin flex flex-col gap-gutter">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">Lý do báo cáo <span class="text-error">*</span></h2>
<div class="flex flex-col gap-3">
<label class="group flex items-center gap-gutter p-gutter rounded-xl border-2 border-outline-variant bg-surface-container-lowest cursor-pointer min-h-touch-target-min hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface-container-low">
<input class="w-6 h-6 text-primary border-outline focus:ring-primary focus:ring-2" name="report_reason" type="radio" value="wrong_info"/>
<span class="font-label-lg text-label-lg text-on-surface flex-1">Thông tin sai lệch</span>
</label>
<label class="group flex items-center gap-gutter p-gutter rounded-xl border-2 border-outline-variant bg-surface-container-lowest cursor-pointer min-h-touch-target-min hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface-container-low">
<input class="w-6 h-6 text-primary border-outline focus:ring-primary focus:ring-2" name="report_reason" type="radio" value="poor_quality"/>
<span class="font-label-lg text-label-lg text-on-surface flex-1">Hàng kém chất lượng / Hư hỏng</span>
</label>
<label class="group flex items-center gap-gutter p-gutter rounded-xl border-2 border-outline-variant bg-surface-container-lowest cursor-pointer min-h-touch-target-min hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface-container-low">
<input class="w-6 h-6 text-error border-outline focus:ring-error focus:ring-2" name="report_reason" type="radio" value="prohibited"/>
<span class="font-label-lg text-label-lg text-error flex-1">Hàng cấm / Vi phạm pháp luật</span>
<span class="material-symbols-outlined text-error">warning</span>
</label>
<label class="group flex items-center gap-gutter p-gutter rounded-xl border-2 border-outline-variant bg-surface-container-lowest cursor-pointer min-h-touch-target-min hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface-container-low">
<input class="w-6 h-6 text-primary border-outline focus:ring-primary focus:ring-2" name="report_reason" type="radio" value="other"/>
<span class="font-label-lg text-label-lg text-on-surface flex-1">Lý do khác</span>
</label>
</div>
</section>
<!-- Details Textarea -->
<section class="px-container-margin flex flex-col gap-unit">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">Chi tiết thêm</h2>
<textarea class="w-full min-h-[140px] p-gutter rounded-xl border-2 border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-0 text-body-lg text-on-surface resize-none placeholder:text-on-surface-variant" placeholder="Vui lòng mô tả rõ hơn về vấn đề bạn gặp phải (tùy chọn)..."></textarea>
</section>
<!-- Image Proof Upload -->
<section class="px-container-margin flex flex-col gap-unit">
<div class="flex items-center justify-between mb-1">
<h2 class="font-headline-md text-headline-md-mobile text-on-surface">Hình ảnh minh chứng</h2>
<span class="font-body-md text-body-md text-on-surface-variant">(Tối đa 3 ảnh)</span>
</div>
<button class="w-full flex flex-col items-center justify-center gap-2 min-h-[160px] border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-lowest hover:bg-surface-variant hover:border-primary transition-all group focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" type="button">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-primary">add_a_photo</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-primary">Nhấn để tải ảnh lên</span>
</button>
</section>
</form>
</main>
<!-- Sticky Footer Action -->
<footer class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-container-margin shadow-[0_-8px_16px_-4px_rgba(0,0,0,0.05)] z-40 flex justify-center">
<div class="w-full max-w-2xl">
<!-- Using Theme Primary instead of explicit #16A34A to adhere to system rules -->
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-full font-headline-md text-headline-md-mobile flex items-center justify-center gap-2 active:bg-primary-fixed-dim hover:brightness-110 transition-all shadow-md focus:outline-none focus:ring-4 focus:ring-primary/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                Gửi Báo cáo
            </button>
</div>
</footer>
</body></html>
