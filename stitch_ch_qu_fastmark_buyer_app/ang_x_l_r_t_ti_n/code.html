<style>
        .loading-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .spin-slow {
            animation: spin 3s linear infinite;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center px-container-margin">
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col items-center justify-center text-center space-y-stack-gap-lg">
<!-- Animated Icon Container -->
<div class="relative flex items-center justify-center w-32 h-32 mb-4">
<!-- Pulsing background rings -->
<div class="absolute inset-0 rounded-full bg-primary-container opacity-20 loading-pulse"></div>
<div class="absolute inset-4 rounded-full bg-primary-container opacity-40 loading-pulse" style="animation-delay: 0.5s;"></div>
<!-- Central solid circle -->
<div class="absolute inset-8 rounded-full bg-primary flex items-center justify-center z-10 shadow-md">
<!-- Rotating icon to indicate processing -->
<span class="material-symbols-outlined text-on-primary icon-fill text-4xl spin-slow" data-icon="sync">
                    sync
                </span>
</div>
<!-- Floating secondary icons -->
<div class="absolute top-0 right-0 animate-bounce" style="animation-duration: 2s;">
<div class="bg-surface rounded-full p-2 shadow-sm border border-outline-variant">
<span class="material-symbols-outlined text-primary text-xl" data-icon="payments">payments</span>
</div>
</div>
</div>
<!-- Typography -->
<div class="space-y-unit">
<!-- Explicit loading message per prompt -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2 md:font-headline-lg md:text-headline-lg">
                Đang xử lý yêu cầu rút tiền...
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                Vui lòng không đóng ứng dụng. Quá trình này có thể mất vài giây.
            </p>
</div>
<!-- Progress Bar (Indeterminate) -->
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden relative mt-8">
<div class="absolute top-0 bottom-0 left-0 bg-primary rounded-full animate-[progress_2s_ease-in-out_infinite]" style="width: 30%;"></div>
</div>
<style>
            @keyframes progress {
                0% { left: -30%; width: 30%; }
                50% { left: 40%; width: 50%; }
                100% { left: 100%; width: 30%; }
            }
        </style>
<!-- Safety / Trust Note -->
<div class="flex items-center gap-2 mt-8 text-on-surface-variant bg-surface-container py-3 px-4 rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-secondary icon-fill" data-icon="security">security</span>
<span class="font-label-md text-label-md">Giao dịch an toàn và bảo mật</span>
</div>
</main>
<!-- Simulated redirect script for effect -->
<script>
        // Simulate a delay then 'redirect' or update UI to show success
        setTimeout(() => {
            const heading = document.querySelector('h1');
            const iconContainer = document.querySelector('.relative.flex');
            const progressBar = document.querySelector('.w-full.h-2');
            
            if(heading) heading.textContent = "Rút tiền thành công!";
            if(progressBar) progressBar.style.display = 'none';
            
            if(iconContainer) {
                iconContainer.innerHTML = `
                    <div class="absolute inset-8 rounded-full bg-secondary flex items-center justify-center z-10 shadow-md">
                        <span class="material-symbols-outlined text-on-secondary icon-fill text-4xl" data-icon="check_circle">
                            check_circle
                        </span>
                    </div>
                `;
            }
        }, 3500);
    </script>
</body></html>
