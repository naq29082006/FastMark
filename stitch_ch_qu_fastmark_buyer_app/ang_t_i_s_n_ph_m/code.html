<style>
        .skeleton-shimmer {
            background: linear-gradient(90deg, 
                theme('colors.surface-container-high') 0%, 
                theme('colors.surface-container-highest') 50%, 
                theme('colors.surface-container-high') 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        @keyframes shimmer {
            0% {

            100% {
