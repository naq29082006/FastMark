<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - Chợ Quê FastMark</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#6bff8f",
                        "on-surface-variant": "#3e4a3d",
                        "primary": "#006b2c",
                        "on-primary-fixed-variant": "#005320",
                        "on-primary-fixed": "#002109",
                        "on-error": "#ffffff",
                        "secondary": "#006e2f",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#bdcaba",
                        "on-surface": "#121c2a",
                        "surface-dim": "#d0dbed",
                        "primary-fixed-dim": "#62df7d",
                        "on-background": "#121c2a",
                        "surface-container": "#e6eeff",
                        "on-tertiary-fixed-variant": "#574500",
                        "on-secondary-fixed": "#002109",
                        "secondary-fixed": "#6bff8f",
                        "surface-container-highest": "#d9e3f6",
                        "surface-container-low": "#eff4ff",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#f7fff2",
                        "surface-container-high": "#dee9fc",
                        "inverse-surface": "#27313f",
                        "primary-container": "#00873a",
                        "primary-fixed": "#7ffc97",
                        "tertiary-container": "#cea700",
                        "secondary-fixed-dim": "#4ae176",
                        "tertiary-fixed": "#ffe083",
                        "tertiary": "#735c00",
                        "outline": "#6e7b6c",
                        "inverse-on-surface": "#eaf1ff",
                        "on-secondary-fixed-variant": "#005321",
                        "inverse-primary": "#62df7d",
                        "tertiary-fixed-dim": "#eec200",
                        "surface-tint": "#006e2d",
                        "on-tertiary-container": "#4e3e00",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#007432",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#231b00",
                        "surface-variant": "#d9e3f6"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "touch-target-min": "56px",
                        "gutter": "16px",
                        "stack-gap-md": "16px",
                        "unit": "8px",
                        "stack-gap-lg": "32px",
                        "container-margin": "24px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "price-display": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "label-lg": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "body-md": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "price-display": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "label-md": ["16px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles to hide default password reveal icon in some browsers to use our own */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col items-center justify-center font-sans antialiased text-on-surface">
<!-- Decorative Top Banner Image for context -->
<div class="absolute top-0 w-full h-48 bg-surface-variant -z-10" data-alt="A warm, inviting flat-lay illustration of fresh green vegetables and traditional Vietnamese market items on a clean, light surface. The style is modern, minimalist, and uses bright, natural lighting to convey freshness and peace of mind (An Tâm). High key lighting, predominantly soft greens and warm off-whites." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCJ6xXh4XfbqaV1Aky6w-cZxhHDF56D7Xs1oXR5hof3VjcsSa02QrW6CwTwiqlzYAl6tzyhn3OdRrte6m3MOIf14tQR7aYDDI9AHi05jUxcW1WmYQ5FAcdhUL5JDAEK5ZhCtScG6ztpfWV_C8uyfQToAh4SAxXPupqpu9g15tyaR7QR3n2XnkwmlR7Z_CoptL3xVQoGQmjGUPjDfjF3CJ3YY6q0Kbs231X-Fb1kb13OcjZcxxhz5YRChvMdR1EFape_fQ7NPrGqa0m5')">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface-container-lowest"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-container-margin py-stack-gap-lg w-full flex flex-col z-10 bg-surface-container-lowest rounded-xl shadow-sm sm:shadow-lg mt-12 sm:mt-0">
<!-- Header Section -->
<header class="mb-stack-gap-lg text-center flex flex-col items-center">
<!-- Brand Icon -->
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-unit mb-4">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<!-- Brand Name (Subtle) -->
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-2">Chợ Quê FastMark</span>
<!-- Large Main Title -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                Đăng nhập
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">
                Mừng bạn quay trở lại
            </p>
</header>
<!-- Form Section -->
<form action="#" class="flex flex-col gap-stack-gap-md" method="POST" onsubmit="event.preventDefault(); alert('Đang xử lý đăng nhập...');">
<!-- Input: Phone Number -->
<div class="flex flex-col">
<label class="font-label-lg text-label-lg text-on-surface mb-unit" for="phone">Số điện thoại</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline pointer-events-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">call</span>
</span>
<input class="w-full min-h-touch-target-min pl-12 pr-4 py-3 rounded-lg border-2 border-outline-variant bg-surface text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder-on-surface-variant opacity-70" id="phone" name="phone" placeholder="Nhập số điện thoại" required="" type="tel"/>
</div>
</div>
<!-- Input: Password -->
<div class="flex flex-col mb-2">
<label class="font-label-lg text-label-lg text-on-surface mb-unit" for="password">Mật khẩu</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline pointer-events-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock</span>
</span>
<input class="w-full min-h-touch-target-min pl-12 pr-12 py-3 rounded-lg border-2 border-outline-variant bg-surface text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder-on-surface-variant opacity-70" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password"/>
<!-- Toggle Password Visibility (Conceptual inline JS) -->
<button aria-label="Hiện mật khẩu" class="absolute inset-y-0 right-0 flex items-center pr-4 text-on-surface-variant hover:text-primary min-h-touch-target-min min-w-[56px] justify-center" onclick="const p=document.getElementById('password'); const i=this.querySelector('span'); if(p.type==='password'){p.type='text'; i.innerText='visibility_off';}else{p.type='password'; i.innerText='visibility';}" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mb-unit">
<a class="font-label-lg text-label-lg text-primary hover:text-secondary hover:underline py-2" href="#">
                    Quên mật khẩu?
                </a>
</div>
<!-- Huge Primary Button -->
<button class="w-full min-h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-3 hover:bg-secondary active:scale-[0.98] transition-all shadow-md mt-4" type="submit">
                Đăng nhập
                <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-stack-gap-lg pt-stack-gap-md border-t border-outline-variant text-center">
<span class="font-body-md text-body-md text-on-surface-variant">Chưa có tài khoản?</span>
<a class="font-label-lg text-label-lg text-primary hover:text-secondary hover:underline ml-1 inline-flex items-center min-h-touch-target-min" href="#">
                Đăng ký ngay
            </a>
</div>
</main>
</body></html>
