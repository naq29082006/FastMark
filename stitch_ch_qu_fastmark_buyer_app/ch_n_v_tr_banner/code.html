<style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d0dbed; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bdcaba; }

        /* Animation for card selection */
        .ad-card { transition: all 0.2s ease-in-out; }
        .ad-card.selected {
            border-color: #006b2c;
            background-color: #f7fff2; /* on-primary-container as a very light bg */
            box-shadow: 0 4px 12px rgba(0, 107, 44, 0.1);
        }
        .ad-card.selected .selection-indicator {
            background-color: #006b2c;
            border-color: #006b2c;
        }
        .ad-card.selected .selection-indicator .material-symbols-outlined {
            opacity: 1;
            transform: scale(1);
        }
        .selection-indicator .material-symbols-outlined {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col pb-32">
<!-- TopAppBar Shared Component -->
<!-- Applying style_shell_layout, style_bg_color, style_separation_logic, style_shadows_and_elevation -->

<!-- Main Content Area -->
<!-- Suppressed NavigationDrawer and BottomNavBar as this is a focused, transactional task flow (selecting an option) -->

<p class="font-body-md text-body-md text-on-surface-variant">Chọn vị trí xuất hiện để tiếp cận khách hàng hiệu quả nhất.</p>
</div>
<!-- Selection Grid/List -->
<div class="flex flex-col gap-stack-gap-md" id="ad-position-container">
<!-- Option 1: Home Screen (Hero) -->
<label class="ad-card relative flex flex-col md:flex-row items-center cursor-pointer border-2 border-outline-variant rounded-xl bg-surface-container-lowest overflow-hidden group">

<div class="w-full h-full max-w-[120px] bg-surface rounded shadow-sm flex flex-col overflow-hidden">

<div class="h-4 bg-outline-variant/30 m-2 rounded-sm w-3/4"></div>
<!-- Highlighted Ad Area -->
<div class="h-16 bg-primary mx-2 rounded flex items-center justify-center relative overflow-hidden">
<span class="text-[10px] text-on-primary font-bold z-10">BANNER</span>
<!-- decorative pattern -->
<div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent"></div>
</div>
<!-- Content fake -->
<div class="flex gap-1 m-2">
<div class="h-6 w-1/2 bg-outline-variant/30 rounded-sm"></div>
<div class="h-6 w-1/2 bg-outline-variant/30 rounded-sm"></div>
</div>
</div>
</div>

<div>

</div>
<!-- Custom Radio Indicator -->
<div class="selection-indicator w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center text-on-primary mt-1 flex-shrink-0">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2">Hiển thị lớn nhất ngay khi khách hàng mở ứng dụng. Tỷ lệ nhấp chuột cao nhất.</p>
<div class="font-price-display text-price-display text-primary">50.000đ <span class="font-body-md text-body-md text-on-surface-variant">/ ngày</span></div>
</div>

<div class="selection-indicator w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center text-on-primary mt-1 flex-shrink-0">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 600;">check</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2">Tiếp cận khách hàng đang tìm kiếm sản phẩm trong một ngành hàng cụ thể.</p>

<div class="w-full h-full max-w-[120px] bg-surface rounded shadow-sm flex flex-col overflow-hidden">

<div class="h-5 bg-outline-variant/30 m-2 rounded-full w-full flex items-center px-1">

<div class="h-6 bg-outline-variant/20 mx-2 mb-1 rounded-sm"></div>
<!-- Highlighted Ad Area -->
<div class="h-8 bg-primary mx-2 mb-1 rounded flex items-center justify-center relative overflow-hidden">

<!-- Sticky Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-container-margin z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">

<div class="hidden sm:block">
<span class="font-body-md text-body-md text-on-surface-variant">Chưa chọn vị trí</span>
</div>
<button class="flex-1 sm:flex-none w-full sm:w-auto h-touch-target-min px-8 bg-primary text-on-primary font-label-lg text-label-lg rounded-full flex items-center justify-center gap-2 disabled:bg-surface-variant disabled:text-outline-variant transition-colors hover:brightness-110 active:brightness-90" disabled="" id="btn-continue">
<span>Tiếp tục</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.ad-card');
            const radios = document.querySelectorAll('input[name="ad_position"]');
            const btnContinue = document.getElementById('btn-continue');
            const statusText = document.querySelector('.fixed.bottom-0 span.text-on-surface-variant');

            cards.forEach(card => {
                card.addEventListener('click', function() {
                    // Remove selected class from all
                    cards.forEach(c => c.classList.remove('selected'));
                    // Add selected class to clicked
                    this.classList.add('selected');
                    // Enable button
                    btnContinue.disabled = false;
                    
                    // Update status text
                    const priceText = this.querySelector('.font-price-display').textContent;
                    if(statusText) {
                        statusText.innerHTML = `Đã chọn: <strong class="text-primary">${priceText}</strong>`;
                    }
                });
            });
        });
    </script>
