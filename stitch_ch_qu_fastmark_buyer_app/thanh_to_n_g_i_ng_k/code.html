<body class="bg-background text-on-background antialiased min-h-screen pb-24 md:pb-0 font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flat no shadows flex flex-col w-full px-container-margin py-unit gap-2 docked full-width top-0 sticky z-40">
<div class="flex items-center justify-between min-h-[56px]">
<button aria-label="Quay lại" class="text-on-surface p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-fixed">Thanh toán</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
</header>
<main class="px-container-margin pt-stack-gap-md max-w-3xl mx-auto">
<!-- Order Summary -->
<section class="bg-surface-container-lowest rounded-xl p-6 border border-outline-variant mb-stack-gap-lg">
<h2 class="font-label-lg text-label-lg text-on-surface mb-4">Chi tiết thanh toán</h2>
<div class="space-y-4">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant">Gói cước</span>
<span class="font-label-lg text-label-lg">Cửa hàng Chuyên nghiệp (1 tháng)</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant">Tạm tính</span>
<span>150.000đ</span>
</div>
<div class="h-px bg-outline-variant w-full"></div>
<div class="flex justify-between items-center">
<span class="font-label-lg text-label-lg">Tổng cộng</span>
<span class="font-price-display text-price-display text-error">150.000đ</span>
</div>
</div>
</section>
<!-- Payment Methods -->
<section class="mb-stack-gap-lg">
<h2 class="font-label-lg text-label-lg text-on-surface mb-4">Phương thức thanh toán</h2>
<div class="space-y-4">
<!-- Wallet Balance -->
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl border border-primary ring-1 ring-primary cursor-pointer relative overflow-hidden transition-all group">
<div class="flex-shrink-0 mr-4 text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="flex-grow">
<div class="font-label-lg text-label-lg text-on-surface">Ví Chợ Quê</div>
<div class="text-on-surface-variant text-sm mt-1">Số dư: 500.000đ</div>
</div>
<div class="flex-shrink-0">
<input checked="" class="w-6 h-6 text-primary focus:ring-primary border-outline-variant" name="payment_method" type="radio" value="wallet"/>
</div>
</label>
<!-- Momo E-wallet -->
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl border border-outline-variant cursor-pointer relative overflow-hidden transition-all hover:border-primary">
<div class="flex-shrink-0 mr-4 text-[#A50064]">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="flex-grow">
<div class="font-label-lg text-label-lg text-on-surface">Ví MoMo</div>
<div class="text-on-surface-variant text-sm mt-1">Thanh toán qua ứng dụng MoMo</div>
</div>
<div class="flex-shrink-0">
<input class="w-6 h-6 text-primary focus:ring-primary border-outline-variant" name="payment_method" type="radio" value="momo"/>
</div>
</label>
<!-- Bank Transfer -->
<label class="flex items-center p-4 bg-surface-container-lowest rounded-xl border border-outline-variant cursor-pointer relative overflow-hidden transition-all hover:border-primary">
<div class="flex-shrink-0 mr-4 text-secondary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<div class="flex-grow">
<div class="font-label-lg text-label-lg text-on-surface">Chuyển khoản ngân hàng</div>
<div class="text-on-surface-variant text-sm mt-1">Quét mã QR qua ứng dụng ngân hàng</div>
</div>
<div class="flex-shrink-0">
<input class="w-6 h-6 text-primary focus:ring-primary border-outline-variant" name="payment_method" type="radio" value="bank"/>
</div>
</label>
</div>
</section>
<!-- Action Button (Sticky Bottom on Mobile) -->
<div class="fixed md:static bottom-0 left-0 w-full p-container-margin bg-surface-container-lowest border-t border-outline-variant md:border-none md:bg-transparent z-40">
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-xl font-headline-md text-headline-md-mobile flex items-center justify-center gap-2 active:opacity-80 transition-opacity shadow-lg">
                Xác nhận thanh toán
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</main>
<!-- BottomNavBar (Hidden as this is a transactional page) -->
<!-- Suppressed due to "Destination" Rule -->
<script>
        // Simple script to toggle active styling on payment methods
        const paymentLabels = document.querySelectorAll('label:has(input[type="radio"])');
        
        paymentLabels.forEach(label => {
            const radio = label.querySelector('input[type="radio"]');
            
            radio.addEventListener('change', () => {
                // Reset all
                paymentLabels.forEach(l => {
                    l.classList.remove('border-primary', 'ring-1', 'ring-primary');
                    l.classList.add('border-outline-variant');
                });
                
                // Set active
                if (radio.checked) {
                    label.classList.add('border-primary', 'ring-1', 'ring-primary');
                    label.classList.remove('border-outline-variant');
                }
            });
        });
    </script>
</body></html>
