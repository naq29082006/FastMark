<style>
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }

        }
        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }

        }
        .animate-fade-in-up {
            animation: fadeInUp 0.7s ease-out 0.2s forwards;
