<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quên mật khẩu - FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface": "#f8f9ff",
                      "on-secondary": "#ffffff",
                      "background": "#f8f9ff",
                      "on-primary-fixed": "#002109",
                      "on-surface-variant": "#3e4a3d",
                      "inverse-surface": "#27313f",
                      "on-error": "#ffffff",
                      "primary-container": "#00873a",
                      "outline": "#6e7b6c",
                      "inverse-on-surface": "#eaf1ff",
                      "surface-dim": "#d0dbed",
                      "secondary-fixed": "#6bff8f",
                      "tertiary": "#735c00",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#eff4ff",
                      "surface-container-highest": "#d9e3f6",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#cea700",
                      "inverse-primary": "#62df7d",
                      "surface-container": "#e6eeff",
                      "surface-container-high": "#dee9fc",
                      "secondary-container": "#6bff8f",
                      "tertiary-fixed": "#ffe083",
                      "primary": "#006b2c",
                      "on-tertiary-fixed": "#231b00",
                      "error": "#ba1a1a",
                      "on-primary-fixed-variant": "#005320",
                      "on-tertiary-container": "#4e3e00",
                      "surface-tint": "#006e2d",
                      "on-primary-container": "#f7fff2",
                      "on-background": "#121c2a",
                      "on-tertiary-fixed-variant": "#574500",
                      "primary-fixed": "#7ffc97",
                      "on-secondary-container": "#007432",
                      "primary-fixed-dim": "#62df7d",
                      "surface-variant": "#d9e3f6",
                      "surface-bright": "#f8f9ff",
                      "on-error-container": "#93000a",
                      "secondary": "#006e2f",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed": "#002109",
                      "on-secondary-fixed-variant": "#005321",
                      "secondary-fixed-dim": "#4ae176",
                      "outline-variant": "#bdcaba",
                      "error-container": "#ffdad6",
                      "on-surface": "#121c2a",
                      "tertiary-fixed-dim": "#eec200"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-gap-md": "16px",
                      "gutter": "16px",
                      "stack-gap-lg": "32px",
                      "unit": "8px",
                      "touch-target-min": "56px",
                      "container-margin": "24px"
              },
              "fontFamily": {
                      "label-lg": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "price-display": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "label-lg": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "body-lg": ["20px", {"lineHeight": "30px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-md": ["16px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "price-display": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]

            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">
<!-- Minimal Header for Transactional Screen -->
<header class="w-full px-container-margin pt-6 pb-2 flex items-center">
<button aria-label="Quay lại" class="h-touch-target-min w-touch-target-min flex items-center justify-start text-on-surface rounded-full active:bg-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-container-margin pt-4 pb-12 w-full max-w-md mx-auto relative z-10">
<!-- Icon/Illustration Graphic -->
<div class="w-24 h-24 bg-surface-container rounded-full flex items-center justify-center mb-8 self-start text-primary">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<!-- Header Texts -->
<div class="mb-10 flex flex-col gap-unit">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Quên mật khẩu?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Nhập số điện thoại để nhận mã xác thực.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-gap-md w-full">
<!-- Phone Number Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="phoneNumber">Số điện thoại</label>
<div class="relative flex items-center">
<span aria-hidden="true" class="material-symbols-outlined absolute left-4 text-outline">call</span>
<input class="w-full h-touch-target-min pl-14 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-outline-variant transition-all" id="phoneNumber" name="phoneNumber" placeholder="Ví dụ: 0912345678" required="" type="tel"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-full font-headline-md text-headline-md-mobile flex items-center justify-center gap-2 mt-8 hover:bg-surface-tint active:scale-[0.98] transition-all shadow-sm" type="button">
<span>Gửi mã OTP</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Spacer to push link down -->
<div class="flex-grow"></div>
<!-- Back to Login Link -->
<div class="w-full flex justify-center mt-8 pb-4">
<a class="font-label-lg text-label-lg text-primary flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-surface-container transition-colors" href="#">
<span class="material-symbols-outlined text-[20px]">login</span>
                Quay lại Đăng nhập
            </a>
</div>
</main>
<!-- Decorative Background Element (Subtle) -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container opacity-20 rounded-full blur-3xl translate-x-1/2 -translate-y-1/4 pointer-events-none"></div>
</body></html>
