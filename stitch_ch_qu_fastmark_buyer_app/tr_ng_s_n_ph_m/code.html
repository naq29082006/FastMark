<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background">

</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed truncate flex-1 text-center px-4">Chợ Quê FastMark</h1>
<div class="flex items-center gap-unit cursor-pointer hover:bg-primary-container/20 rounded-full p-2 transition-colors duration-200">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Content Area - Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-container-margin mt-[56px] mb-[80px]">
<div class="flex flex-col items-center max-w-md w-full text-center space-y-stack-gap-lg">

</div>

<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container transition-colors active:scale-[0.98] shadow-sm">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                Đăng sản phẩm ngay
                <span class="material-symbols-outlined ml-2" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Action (Optional Help) -->
<button class="w-full h-touch-target-min bg-transparent border border-primary text-primary font-label-lg text-label-lg rounded-lg flex items-center justify-center hover:bg-surface-container-low transition-colors active:scale-[0.98]">
                Xem hướng dẫn đăng bài
            </button>
</div>
</main>
<!-- BottomNavBar -->
<!-- Active State: Sản phẩm (index 1) based on context -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 h-auto bg-surface dark:bg-on-background border-t border-outline-variant dark:border-outline rounded-t-xl transition-colors duration-200">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-unit py-1 hover:text-primary scale-95 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md text-xs">Bảng tin</span>
</a>

</a>
