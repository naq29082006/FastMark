<script>
        // Simple script to handle category active state visual update
        document.addEventListener('DOMContentLoaded', () => {
            const categoryButtons = document.querySelectorAll('.sticky button');
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Reset all
                    categoryButtons.forEach(btn => {
                        btn.className = 'snap-start shrink-0 min-h-[48px] px-6 rounded-full bg-surface-container text-on-surface font-label-lg text-label-lg border border-outline-variant/50 transition-colors';
                    });
                    // Set active
                    this.className = 'snap-start shrink-0 min-h-[48px] px-6 rounded-full bg-primary text-on-primary font-label-lg text-label-lg shadow-sm transition-colors';
                });
            });
        });
    </script>
