<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đổi mật khẩu - Chợ Quê FastMark</title>

                      "on-tertiary-fixed": "#231b00",
                      "inverse-surface": "#27313f",
                      "tertiary-fixed": "#ffe083",
                      "surface": "#f8f9ff",
                      "on-secondary-fixed-variant": "#005321",
                      "surface-container-high": "#dee9fc",
                      "secondary-fixed": "#6bff8f",
                      "on-tertiary-fixed-variant": "#574500",
                      "surface-variant": "#d9e3f6",
                      "surface-tint": "#006e2d",
                      "on-tertiary": "#ffffff",
                      "surface-container": "#e6eeff",
                      "primary-fixed-dim": "#62df7d",
                      "primary": "#006b2c",
                      "background": "#f8f9ff",
                      "on-primary-container": "#f7fff2",
                      "surface-container-low": "#eff4ff",
                      "tertiary-container": "#cea700",
                      "surface-container-lowest": "#ffffff",
                      "outline": "#6e7b6c",
                      "surface-dim": "#d0dbed",
                      "on-secondary-fixed": "#002109",
                      "secondary-container": "#6bff8f",
                      "secondary": "#006e2f",
                      "on-primary-fixed": "#002109",
                      "inverse-primary": "#62df7d",
                      "on-surface-variant": "#3e4a3d",
                      "tertiary-fixed-dim": "#eec200",
                      "on-secondary-container": "#007432",
                      "outline-variant": "#bdcaba",
                      "on-secondary": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-error": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",

                      "full": "9999px"
              },
              "spacing": {
                      "container-margin": "24px",
                      "unit": "8px",
                      "stack-gap-lg": "32px",
                      "touch-target-min": "56px",
                      "gutter": "16px",
                      "stack-gap-md": "16px"
              },
              "fontFamily": {

                      "headline-lg": [

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flex flex-col w-full px-container-margin py-unit gap-2 docked full-width top-0 z-40 sticky">
<div class="flex items-center justify-between h-[64px]">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-colors flex items-center justify-center h-touch-target-min w-touch-target-min text-on-surface">
<span class="material-symbols-outlined text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed md:font-headline-lg md:text-headline-lg absolute left-1/2 -translate-x-1/2">
                Đổi mật khẩu
            </h1>
<!-- Empty div to balance flex spacing since there's no trailing icon in a purely transactional back screen -->
<div class="w-touch-target-min"></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col px-container-margin py-stack-gap-lg max-w-lg mx-auto w-full">
<div class="mb-stack-gap-lg">
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Vui lòng nhập mật khẩu hiện tại và mật khẩu mới của bạn. Mật khẩu mới nên dài ít nhất 8 ký tự.
            </p>
</div>
<form class="flex flex-col gap-stack-gap-md flex-grow">
<!-- Current Password -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="current-password">Mật khẩu hiện tại</label>
<div class="relative w-full">
<input class="w-full h-touch-target-min px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow pr-12" id="current-password" name="current-password" placeholder="Nhập mật khẩu hiện tại" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors h-12 w-12 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary" onclick="togglePasswordVisibility('current-password', 'current-password-icon')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="current-password-icon">visibility_off</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface" for="new-password">Mật khẩu mới</label>
<div class="relative w-full">
<input class="w-full h-touch-target-min px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow pr-12" id="new-password" name="new-password" placeholder="Nhập mật khẩu mới" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors h-12 w-12 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary" onclick="togglePasswordVisibility('new-password', 'new-password-icon')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="new-password-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div class="flex flex-col gap-unit mb-8">
<label class="font-label-lg text-label-lg text-on-surface" for="confirm-password">Xác nhận mật khẩu mới</label>
<div class="relative w-full">
<input class="w-full h-touch-target-min px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow pr-12" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu mới" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors h-12 w-12 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary" onclick="togglePasswordVisibility('confirm-password', 'confirm-password-icon')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="confirm-password-icon">visibility_off</span>
</button>
</div>
</div>
<div class="mt-auto pt-stack-gap-lg pb-stack-gap-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 hover:bg-surface-tint transition-colors focus:outline-none focus:ring-4 focus:ring-primary-container active:scale-[0.98]" type="submit">
                    Lưu thay đổi
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</main>
<script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
                icon.setAttribute('data-icon', 'visibility');
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
                icon.setAttribute('data-icon', 'visibility_off');
            }
        }
    </script>
</body></html>
