<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xác thực khuôn mặt - Chợ Quê FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#005321",
                        "secondary-fixed-dim": "#4ae176",
                        "secondary": "#006e2f",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#002109",
                        "on-surface": "#121c2a",
                        "tertiary-fixed-dim": "#eec200",
                        "outline-variant": "#bdcaba",

                    "borderRadius": {

                    "fontFamily": {

<style>
        .camera-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- Top App Bar - Simplified for verification step -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-touch-target-min bg-surface dark:bg-on-background flat no shadows">
<button aria-label="Quay lại" class="h-touch-target-min w-touch-target-min flex items-center justify-start text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Xác thực</h1>
<div class="w-touch-target-min"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center pt-24 pb-32 px-container-margin">
<div class="w-full max-w-md mx-auto flex flex-col items-center">
<!-- Instructions -->
<div class="text-center mb-stack-gap-lg w-full">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-stack-gap-md">
                    Xác minh danh tính
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Bác hãy nhìn thẳng vào camera và mỉm cười nhé. Điều này giúp bảo mật tài khoản tốt hơn.
                </p>
</div>
<!-- Camera Viewfinder -->
<div class="relative w-64 h-64 md:w-80 md:h-80 mb-stack-gap-lg flex-shrink-0">
<!-- Decorative Ring -->
<div class="absolute inset-0 rounded-full border-4 border-primary-fixed-dim camera-ring"></div>
<!-- Camera Feed Container -->
<div class="absolute inset-2 rounded-full overflow-hidden border-4 border-primary bg-surface-container-high shadow-inner z-10 flex items-center justify-center">
<!-- Fallback / Static Image for demo -->
<img class="w-full h-full object-cover" data-alt="A softly lit, warm and inviting portrait of an elderly Vietnamese person smiling gently directly at the camera. The background is slightly blurred but suggests a traditional, cozy rural home or a quiet local market. High contrast, clear, and perfectly centered within a circular frame, emphasizing a welcoming 'Chợ Quê' aesthetic. Light mode UI context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ5VlMUiAnZ_BZkfHYg_g199p8X_k3DzHsWtrpUYuiYdZZSrXUiwpdmkYqaW8UO-pOBjIFuIzpoVgii8vUl8-agjsGyO0Bex_G-cchIzGuo4EANqhb4Bqy-2LA7dArtQaZHmIPyuOvxZ2BlLjQCRPnDVYEqJeKUmoWcrYPO_F9O6u0Ob1fPS-0tVHk3w591I9FN2wx3fm4oB62QZawAMox1y1Rzod5km1Lz0lJZXFnI1bCEGMr0B-rKSpeBf_Vpu03XFNW3E5gp28U"/>
<!-- Overlay Guide Lines -->
<div class="absolute inset-0 pointer-events-none opacity-30 flex items-center justify-center">
<svg class="w-full h-full text-white" viewbox="0 0 100 100">
<path d="M 30,50 Q 50,70 70,50" fill="transparent" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
</svg>
</div>
</div>
<!-- Status Icon -->
<div class="absolute bottom-4 right-4 z-20 bg-primary text-on-primary rounded-full p-2 shadow-lg border-2 border-surface">
<span class="material-symbols-outlined block" data-icon="face">face</span>
</div>
</div>
<!-- Feedback Message -->
<div class="bg-primary-container text-on-primary-container rounded-lg p-4 w-full text-center flex items-center justify-center gap-2 mb-stack-gap-lg">
<span class="material-symbols-outlined" data-icon="info">info</span>
<span class="font-label-lg text-label-lg">Ánh sáng tốt. Giữ điện thoại ngang tầm mắt.</span>
</div>
</div>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-surface border-t border-outline-variant z-40 pb-safe">
<div class="max-w-md mx-auto">
<button class="w-full h-touch-target-min bg-primary hover:bg-surface-tint text-on-primary font-headline-md text-headline-md rounded-xl shadow-sm transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
                Xác nhận
            </button>
</div>
</div>
</body></html>
