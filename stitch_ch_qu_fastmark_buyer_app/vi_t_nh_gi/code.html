<script>
        // Simple interactive star rating logic
        document.addEventListener('DOMContentLoaded', () => {
            const starContainer = document.getElementById('star-rating-container');
            const stars = starContainer.querySelectorAll('button');
            const ratingText = document.getElementById('rating-text');
            const texts = ["Rất tệ", "Tệ", "Bình thường", "Tốt", "Tuyệt vời!"];
            
            let currentRating = 4; // 1-based index (4 stars selected by default)

            function updateStars(rating) {
                stars.forEach((btn, index) => {
                    const icon = btn.querySelector('span');
                    if (index < rating) {
                        // Filled state
                        btn.className = "text-tertiary-fixed-dim hover:text-tertiary transition-transform hover:scale-110";
                        icon.setAttribute('data-weight', 'fill');
                        icon.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        // Empty state
                        btn.className = "text-outline-variant hover:text-tertiary-fixed-dim transition-transform hover:scale-110";
                        icon.removeAttribute('data-weight');
                        icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
                ratingText.textContent = texts[rating - 1];
            }

            stars.forEach((star, index) => {
                star.addEventListener('click', () => {
                    currentRating = index + 1;
                    updateStars(currentRating);
                });
            });
            
            // Initialize
            updateStars(currentRating);
        });
    </script>
