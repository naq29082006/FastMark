<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rút tiền thất bại - FastMark</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#6bff8f",

                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e6eeff",
                        "surface": "#f8f9ff",
                        "surface-variant": "#d9e3f6",
                        "tertiary-fixed-dim": "#eec200",
                        "surface-dim": "#d0dbed",
                        "on-background": "#121c2a",
                        "outline-variant": "#bdcaba",
                        "tertiary-fixed": "#ffe083",
                        "on-tertiary-fixed": "#231b00",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#005321",
                        "secondary": "#006e2f",
                        "primary-container": "#00873a",
                        "inverse-primary": "#62df7d",
                        "outline": "#6e7b6c",
                        "on-primary-container": "#f7fff2",
                        "on-primary-fixed-variant": "#005320",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#4ae176",
                        "on-surface": "#121c2a",
                        "on-secondary-container": "#007432",
                        "surface-tint": "#006e2d",
                        "on-tertiary-container": "#4e3e00",
                        "tertiary-container": "#cea700",
                        "on-tertiary-fixed-variant": "#574500",
                        "surface-container-low": "#eff4ff",
                        "surface-container-highest": "#d9e3f6",
                        "on-secondary": "#ffffff",
                        "tertiary": "#735c00",
                        "secondary-fixed": "#6bff8f",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "surface-container-high": "#dee9fc",
                        "on-primary-fixed": "#002109",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#62df7d",
                        "inverse-on-surface": "#eaf1ff",
                        "primary": "#006b2c",
                        "inverse-surface": "#27313f",
                        "on-secondary-fixed": "#002109",
                        "surface-bright": "#f8f9ff",
                        "on-surface-variant": "#3e4a3d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-md": "16px",
                        "gutter": "16px",
                        "container-margin": "24px",
                        "stack-gap-lg": "32px",
                        "unit": "8px",
                        "touch-target-min": "56px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "price-display": ["Inter"],

                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["20px", { "lineHeight": "30px", "fontWeight": "400" }],
                        "price-display": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-md": ["16px", { "lineHeight": "20px", "fontWeight": "500" }],

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-container-margin md:p-stack-gap-lg">
<!-- Error State Container -->
<main class="w-full max-w-md mx-auto bg-surface-container-lowest rounded-xl border border-outline-variant p-stack-gap-lg flex flex-col items-center text-center shadow-sm">
<!-- Error Icon -->
<div class="w-24 h-24 rounded-full bg-error-container text-error flex items-center justify-center mb-stack-gap-md shrink-0">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<!-- Text Content -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-unit">
            Rút tiền thất bại
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-gap-lg max-w-sm">
            Giao dịch rút tiền của bạn không thành công. Nguyên nhân có thể do thông tin tài khoản ngân hàng không chính xác hoặc hệ thống đang bảo trì.
        </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-stack-gap-md">
<!-- Primary Action -->
<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-[0.98] transition-transform">
<span>Thử lại</span>
<span class="material-symbols-outlined">refresh</span>
</button>
<!-- Secondary Action -->
<button class="w-full h-touch-target-min bg-transparent border-2 border-primary text-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">support_agent</span>
<span>Liên hệ hỗ trợ</span>
</button>
</div>
<!-- Back Link -->
<a class="mt-stack-gap-lg font-label-md text-label-md text-on-surface-variant hover:text-primary flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
            Quay lại ví
        </a>
</main>
</body></html>
