<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-primary-container/20 rounded-full transition-colors duration-200">

</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-stack-gap-lg max-w-lg mx-auto w-full">
<!-- Status Icon -->
<div class="w-32 h-32 bg-error-container rounded-full flex items-center justify-center mb-stack-gap-lg">
<span class="material-symbols-outlined text-error text-[64px]" data-icon="error" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<!-- Headline -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface text-center mb-stack-gap-md">
            Xác thực bị từ chối
        </h2>
<!-- Description -->
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-stack-gap-lg">
            Rất tiếc, hồ sơ của bạn chưa đủ điều kiện để mở cửa hàng trên Chợ Quê FastMark.
        </p>
<!-- Reason Card -->
<div class="w-full bg-surface-container-low border border-error/30 rounded-xl p-stack-gap-md mb-stack-gap-lg flex flex-col gap-unit">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-error mt-1" data-icon="warning">warning</span>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Lý do từ chối:</h3>
<ul class="list-disc list-inside font-body-md text-body-md text-on-surface-variant mt-2 space-y-1">
<li>Ảnh chụp Chứng minh nhân dân / Căn cước công dân bị mờ, không rõ chữ.</li>
<li>Thông tin đăng ký không khớp với giấy tờ tuỳ thân.</li>
</ul>
</div>
</div>
</div>

<button class="w-full h-touch-target-min bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-2 hover:bg-primary-container hover:text-on-primary-container active:scale-95 transition-all duration-200">
